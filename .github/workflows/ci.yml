name: Dragonfly Flight Controller CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
  
  steps:
    - name: Checkout Dragofly
      uses: actions/checkout@v4
    
    - name: Install ARM
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi cmake
    
    - name: Configure
      run: cmake -B build
    
    - name: Build
      run: cmake --build build